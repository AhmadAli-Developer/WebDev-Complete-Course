<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 5</title>
    <link rel="stylesheet" href="style3.css">
</head>

<body>
    <img width="1000" height="500" src="images.jpg" alt="No Show">
    <br>

    <table>
        <caption>My Info</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
            </tr>
        </thead>
        <tbody>
            <td>Ahmad Ali</td>
            <td>20</td>
            <td>Male</td>

            <tr>
                <td colspan="2">Abbas Ali</td>
                <td>Male</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Abbas Ali</td>
                <td>Male</td>
            </tr>
        </tfoot>
    </table>

    <h1>Unordered List</h1>
    <ul>
        <li>Ahmad</li>
        <li>Ali</li>
        <li>Abbas</li>
    </ul>
    <h1>Ordered List</h1>
      <ol>
        <li>Ahmad</li>
        <li>Ali</li>
        <li>Abbas</li>
    </ol>
    <script src="script3.js"></script>
</body>

</html>
